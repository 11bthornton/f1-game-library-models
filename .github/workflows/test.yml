name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macOS-latest
        toolchain:
          - nightly
        cargo_flags:
          - "--no-default-features"
          - "--all-features"
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}

      - name: Build
        run: cargo build --all ${{ matrix.cargo_flags }}

      - name: Test
        run: cargo test --all ${{ matrix.cargo_flags }}

  big-endian:
    name: Big-endian cross-compile (s390x)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install Rust (nightly + s390x target)
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: s390x-unknown-linux-gnu

      - name: Install cross
        run: cargo install cross --locked

      - name: Build (s390x, no default features)
        run: cross build --target s390x-unknown-linux-gnu --no-default-features

      - name: Test (s390x, no default features)
        run: cross test --target s390x-unknown-linux-gnu --no-default-features

